<header class="topo">
  <div class="marca">
    <h1>Simulador de Empréstimo</h1>
    <p>Price · SAC · campo-alvo · CET (BACEN) — precisão bancária no front-end</p>
  </div>

  <button
    type="button"
    class="btn-tema"
    title="Alternar tema claro/escuro"
    [class.escuro]="theme.tema() === 'escuro'"
    (click)="theme.alternar()"
    [attr.aria-label]="theme.tema() === 'claro' ? 'Ativar modo escuro' : 'Ativar modo claro'"
    [attr.aria-pressed]="theme.tema() === 'escuro'"
  >
    <span class="icone-tema">
      <svg class="sol" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="4.3" />
        <g class="raios">
          <line x1="12" y1="1.6" x2="12" y2="4.1" />
          <line x1="12" y1="19.9" x2="12" y2="22.4" />
          <line x1="1.6" y1="12" x2="4.1" y2="12" />
          <line x1="19.9" y1="12" x2="22.4" y2="12" />
          <line x1="4.4" y1="4.4" x2="6.2" y2="6.2" />
          <line x1="17.8" y1="17.8" x2="19.6" y2="19.6" />
          <line x1="4.4" y1="19.6" x2="6.2" y2="17.8" />
          <line x1="17.8" y1="6.2" x2="19.6" y2="4.4" />
        </g>
      </svg>
      <svg class="lua" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M21 12.9A8.6 8.6 0 1 1 11.1 3 6.7 6.7 0 0 0 21 12.9Z" />
      </svg>
    </span>
  </button>
</header>

<main>
  <router-outlet />
</main>
